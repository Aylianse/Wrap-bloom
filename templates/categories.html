{% extends "base.html" %}

{% block title %}Categories — Wrap & Bloom{% endblock %}

{% block content %}
<section class="py-16 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-12">
            <h1 class="font-serif text-4xl text-gray-900 mb-3">Categories</h1>
            <p class="text-gray-500 font-light">Choose a bouquet category to explore products.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for category in categories %}
            <a href="{{ url_for('main.category_products', category_name=category) }}" class="block bg-blush-50 hover:bg-blush-100 border border-blush-100 rounded-2xl p-8 text-center transition-colors">
                <h3 class="font-serif text-xl text-gray-900">{{ category }}</h3>
            </a>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
